{{ define "home_title" }}{{ t "nav.home" }}{{ end }}

{{ define "home_content" }}
{{ if .Alert }}

<mecfs-alert type="info" id="alert-banner">
        <div class="alert alert--info" slot="alert">
        <svg fill="#000000" height="200px" width="200px" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 24 24" enable-background="new 0 0 24 24" xml:space="preserve"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <g id="install"> <path d="M12,21.5l-8-4.7v-3.8l-4-2.4l5-4.7l7-3.3l7.2,3.3l4.8,4.7l-4,2.3v3.8L12,21.5z M13,12.2V19l5-3v-2l-2.1,1.2L13,12.2z M6,16 l5,3v-6.8l-3.1,3L6,14V16z M13.4,10.5l2.9,2.7l5.2-3.1l-3-2.8L13.4,10.5z M2.6,10.1l5.1,3.1l2.9-2.7L5.5,7.3L2.6,10.1z M7.1,6.5 l4.9,3l4.9-3L12,4.1L7.1,6.5z"></path> </g> </g></svg>
        <div>

          <p>{{ t .Alert.Key }}</p>
            <div class="flex row gap-1">
          <button
		type="button"
		class="button"
		hx-post="/alert/{{ .Alert.Version }}/dismiss"
		hx-target="#alert-banner"
		hx-swap="outerHTML"
	>{{ t "alert.dismiss" }}</button>
        </div>
          </p>
        </div>
        
        <button slot="dismiss" type="button" class="alert__close" aria-label="Close alert">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
        </mecfs-alert>
{{ end }}
<section class="card">
	{{ template "add_entry_content" .AddEntryForm }}
</section>
<section>
	{{ template "voice_entry_section" . }}
</section>
{{ end }}
