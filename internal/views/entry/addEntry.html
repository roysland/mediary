{{ define "entries_add_title" }}Add Entry{{ end }}

{{ define "add_entry_content" }}
<fieldset>

<form method="post" action="/entry/add"
      hx-post="/entry/add"
      hx-swap="none">
<div style="display: flex; justify-content: space-between;">
    <label for="entry_input">{{t "entry.input.label"}}</label>
<label for="is_private-entry">
    <input type="checkbox" id="is_private-entry" name="is_private_entry" role="switch">
    {{t "entry.private.label"}}
</label>
</div>

    <textarea id="entry_input" name="entry_input" rows="4" cols="50" placeholder="" required></textarea>

<button
id="entry_submit_button" 
            type="submit"
            class="submit-button"
            data-submit-state
            data-submit-visual="idle"
          >
            <span class="submit-layer submit-label">{{t "save"}}</span>
            <span class="submit-layer submit-spinner" aria-hidden="true"></span>
            <span class="submit-layer submit-check" aria-hidden="true"></span>
          </button>
</form>
</fieldset>
<script>
      ;(() => {
        const SPINNER_DELAY_MS = 180
        const SUCCESS_HOLD_MS = 800
        const state = new WeakMap()

        const getMeta = (button) => {
          let meta = state.get(button)
          if (!meta) {
            meta = {
              mode: 'idle',
              spinnerTimer: null,
              resetTimer: null,
              widthLocked: false,
            }
            state.set(button, meta)
          }
          return meta
        }

        const clearTimers = (meta) => {
          if (meta.spinnerTimer) {
            window.clearTimeout(meta.spinnerTimer)
            meta.spinnerTimer = null
          }
          if (meta.resetTimer) {
            window.clearTimeout(meta.resetTimer)
            meta.resetTimer = null
          }
        }

        const lockButtonWidth = (button, meta) => {
          if (meta.widthLocked) return
          const width = Math.ceil(button.getBoundingClientRect().width)
          button.style.setProperty('--submit-fixed-width', `${width}px`)
          button.setAttribute('data-fixed-width', '')
          meta.widthLocked = true
        }

        const unlockButtonWidth = (button, meta) => {
          if (!meta.widthLocked) return
          button.removeAttribute('data-fixed-width')
          button.style.removeProperty('--submit-fixed-width')
          meta.widthLocked = false
        }

        const setLoading = (button) => {
          if (!(button instanceof HTMLButtonElement)) return
          const meta = getMeta(button)
          if (meta.mode === 'loading') return

          clearTimers(meta)
          lockButtonWidth(button, meta)

          meta.mode = 'loading'
          button.disabled = true
          button.setAttribute('aria-busy', 'true')
          button.dataset.submitVisual = 'idle'

          meta.spinnerTimer = window.setTimeout(() => {
            if (meta.mode === 'loading') {
              button.dataset.submitVisual = 'loading'
            }
          }, SPINNER_DELAY_MS)
        }

        const setSuccess = (button) => {
          if (!(button instanceof HTMLButtonElement)) return
          const meta = getMeta(button)
          if (meta.mode === 'success') return

          clearTimers(meta)
          if (!meta.widthLocked) {
            lockButtonWidth(button, meta)
          }

          meta.mode = 'success'
          button.disabled = true
          button.removeAttribute('aria-busy')
          button.dataset.submitVisual = 'success'

          meta.resetTimer = window.setTimeout(() => {
            reset(button)
          }, SUCCESS_HOLD_MS)
        }

        const reset = (button) => {
          if (!(button instanceof HTMLButtonElement)) return
          const meta = getMeta(button)

          clearTimers(meta)
          meta.mode = 'idle'

          button.disabled = false
          button.removeAttribute('aria-busy')
          button.dataset.submitVisual = 'idle'
          unlockButtonWidth(button, meta)
        }

        const findSubmitButton = (form, submitter) => {
          if (submitter instanceof HTMLButtonElement && submitter.matches('[data-submit-state]')) {
            return submitter
          }
          return form.querySelector('button[type="submit"][data-submit-state]')
        }

        document.addEventListener('submit', (event) => {
          const form = event.target
          if (!(form instanceof HTMLFormElement)) return

          const button = findSubmitButton(form, event.submitter)
          if (!button) return

          setLoading(button)
        })

        window.SubmitState = {
          setLoading,
          setSuccess,
          reset,
        }

        // HTMX integration: drive button state from HTMX lifecycle events.
        // The global submit listener above already calls setLoading when HTMX
        // intercepts the form submit, so we only need the after-request hook.
        document.body.addEventListener('htmx:afterRequest', (evt) => {
          const form = evt.detail.elt
          if (!(form instanceof HTMLFormElement)) return
          const button = findSubmitButton(form, null)
          if (!button) return
          if (evt.detail.successful) {
            setSuccess(button)
            form.reset()
          } else {
            reset(button)
          }
        })
      })()
    </script>


{{ end }}
