{{ define "entries_add_title" }}Add Entry{{ end }}

{{ define "entries_add_content" }}
<section class="card">
  {{ template "add_entry_content" . }}
</section>
{{ end }}

{{ define "add_entry_content" }}
<fieldset>

<form method="post" action="/entry/add"
      hx-post="/entry/add"
  hx-swap="none"
  data-submit-state>
<div style="display: flex; justify-content: space-between;">
    <label for="entry_input">{{t "entry.input.label"}}</label>
<label for="is_private-entry">
    <input type="checkbox" id="is_private-entry" name="is_private_entry" role="switch">
    {{t "entry.private.label"}}
</label>
</div>

    <textarea id="entry_input" name="entry_input" rows="4" cols="50" placeholder="" required></textarea>

<button
id="entry_submit_button" 
            type="submit"
            class="submit-button"
            data-submit-state-button
            data-submit-visual="idle"
          >
            <span class="submit-layer submit-label">{{t "save"}}</span>
            <span class="submit-layer submit-spinner" aria-hidden="true"></span>
            <span class="submit-layer submit-check" aria-hidden="true"></span>
          </button>
</form>
</fieldset>
{{ end }}
