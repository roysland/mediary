{{ define "share_password_title" }}Open Shared Report{{ end }}
{{ define "share_password_content" }}
<section class="card">
    <h1>Open shared report</h1>
    <p>This link expires at {{ formatUnix .ExpiresAtUTC }}.</p>
    <form method="post" action="/share/{{ .Token }}">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="one-time-code">
        <button type="submit" class="button">Open report</button>
    </form>
</section>
{{ end }}
