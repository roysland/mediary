{{ define "onboarding_step2_language" }}
<section>
    <p>{{ t "onboarding.step2.body" }}</p>
    <label for="onboarding_language">{{ t "settings.language.label" }}</label>
    <select id="onboarding_language" name="language" required>
        <option value="en" {{ if eq .Language "en" }}selected{{ end }}>{{ t "settings.language.english" }}</option>
        <option value="no" {{ if eq .Language "no" }}selected{{ end }}>{{ t "settings.language.norwegian" }}</option>
    </select>
</section>
{{ end }}
