{{ define "auth_title" }}{{ t "auth.title" }}{{ end }}

{{ define "auth_content" }}
<section class="card auth-card" data-auth-passkey>
	<h1>{{ t "auth.title" }}</h1>
	<p>{{ t "auth.subtitle" }}</p>
	<div class="auth-actions">
		<button type="button" class="button" data-auth-register>{{ t "auth.create_passkey" }}</button>
		<button type="button" class="button button--ghost" data-auth-login>{{ t "auth.sign_in" }}</button>
	</div>
	<p class="auth-status" data-auth-status aria-live="polite"></p>
</section>
{{ end }}
