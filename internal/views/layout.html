{{ define "layout" }}<!DOCTYPE html>
<html lang="{{ .Locale }}"{{ if ne .Theme "system" }} data-theme="{{ .Theme }}"{{ end }}>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<meta name="color-scheme" content="light dark">
	<title>{{ if .Title }}{{ .Title }}{{ else }}{{ t "app.title" }}{{ end }}</title>
	<link rel="stylesheet" href="/static/style.css">
	<script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
</head>
<body>
<mecfs-app-shell>
<!-- {{ template "topNav" .Data }} -->
{{ template "bottomNav" . }}
<main class="container">
	{{ .Content }}
</main>


</mecfs-app-shell>
<script type="module" src="/static/main.js"></script>
{{ if .ServiceWorker }}
<script>
	if ("serviceWorker" in navigator) {
		navigator.serviceWorker.register("/static/sw.js?v={{ .BuildVersion }}", { scope: "/" }).catch(function(err) {
			console.warn("service worker registration failed", err);
		});
	}
</script>
{{ end }}

{{ if .DebugTemplateData }}
<script>
	// For dev testing, add all data inside .Data into a javascript object.
	window.templateData = {{ .Data | json }};
	console.log("Data passed to template:", window.templateData);
</script>
{{ end }}
</body>
</html>
{{ end }}
